---
name: Cogni AI Agent
concurrency:
  cancel-in-progress: true
  group: cogni-ai-agent-${{ github.event.issue.number || github.event.pull_request.number || github.ref }}
on:
  discussion:
    types:
      - created
      - edited
      - answered
  discussion_comment:
    types:
      - created
  issue_comment:
    types:
      - created
  issues:
    types:
      - opened
      - edited
  pull_request:
    types:
      - opened
      - edited
  pull_request_review_comment:
    types:
      - created
  workflow_call:
    inputs:
      model:
        description: Model to use for OpenCode
        required: false
        type: string
      prompt:
        description: Prompt for the agent
        required: false
        type: string
  workflow_dispatch:
    inputs:
      model:
        description: Model to use for OpenCode
        required: false
        type: string
      prompt:
        description: Prompt for the agent
        required: false
        type: string
jobs:
  cogni-ai-agent:
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    secrets: inherit  # pragma: allowlist secret
    uses: Cogni-AI-OU/.github/.github/workflows/cogni-ai-agent.yml@main
    with:
      model: >-
        ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call')
        && inputs.model }}
      prompt: >-
        ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call')
        && inputs.prompt }}
