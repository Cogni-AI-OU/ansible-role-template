---
name: Molecule
# yamllint disable-line rule:truthy
on:
  pull_request:
    paths-ignore:
      - '!.github/workflows/**'
      - '**.cfg'
      - '**.md'
      - .*
      - LICENSE
      - Pipfile*
  push:
    paths-ignore:
      - '!.github/workflows/**'
      - '**.cfg'
      - '**.md'
      - .*
      - LICENSE
      - Pipfile*
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - default
    steps:
      - uses: actions/checkout@v6
        with:
          path: ${{ github.repository }}
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles(format('{0}/.devcontainer/requirements.txt', github.repository), format('{0}/Pipfile*', github.repository)) }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - uses: gofrolist/molecule-action@v2
        env:
          ANSIBLE_FORCE_COLOR: '1'
          ANSIBLE_STDOUT_CALLBACK: ${{ runner.debug == '1' && 'debug' || 'ansible.builtin.default' }}
          ANSIBLE_CALLBACK_RESULT_FORMAT: yaml
          MOLECULE_REPORT: molecule-${{ matrix.scenario }}-report.html
        with:
          molecule_args: >-
            --scenario-name ${{ matrix.scenario }}
          molecule_command: test
          molecule_options: ${{ runner.debug == '1' && '--verbose' || '' }}
          molecule_working_dir: ${{ github.repository }}
      - if: always()
        name: Ensure report file permissions are correct
        run: sudo chmod 644 molecule-${{ matrix.scenario }}-report.html
        working-directory: ${{ github.repository }}
      - if: always()
        name: Converts test report
        uses: patrick-werner/fhir-html-validation-to-markdown@1.0.0
        with:
          input_file: ${{ github.repository }}/molecule-${{ matrix.scenario }}-report.html
      # Debug with tmate on failure when debug logging is enabled.
      - if: ${{ failure() && runner.debug == '1' }}
        uses: mxschmitt/action-tmate@v3
    timeout-minutes: 20
